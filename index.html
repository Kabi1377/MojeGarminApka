<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Garmin AI Trenér</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 15px; }
        .app-container { width: 100%; max-width: 480px; background-color: #1e293b; border-radius: 24px; padding: 20px; border: 1px solid #334155; box-shadow: 0 20px 40px rgba(0,0,0,0.4); display: flex; flex-direction: column; gap: 15px; margin-top: 1vh;}
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 12px; }
        .header-title { font-size: 22px; font-weight: 700; background: linear-gradient(to right, #34d399, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-dot { width: 10px; height: 10px; background-color: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; }
        .sync-info { background-color: rgba(15, 23, 42, 0.6); padding: 10px 14px; border-radius: 12px; border: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .sync-label { color: #94a3b8; }
        .sync-time { color: #f59e0b; font-weight: 700; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-label { font-size: 14px; font-weight: 500; color: #94a3b8; margin-left: 4px; display: flex; justify-content: space-between; align-items: center;}
        .change-token { font-size: 13px; color: #cbd5e1; background: #334155; padding: 4px 10px; border-radius: 8px; cursor: pointer; transition: 0.2s;}
        .change-token:hover { background: #475569; }
        .textarea-custom { width: 100%; height: 120px; background-color: #0f172a; border: 1px solid #475569; border-radius: 16px; padding: 16px; font-size: 16px; color: #f8fafc; resize: none; transition: border-color 0.3s; }
        .textarea-custom:focus { outline: none; border-color: #10b981; box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2); }
        .textarea-custom::placeholder { color: #64748b; }
        .photo-pill { display: flex; align-items: center; justify-content: space-between; background-color: #0f172a; border: 1px solid #475569; border-radius: 16px; padding: 10px 14px; }
        .photo-info { display: flex; align-items: center; gap: 12px; overflow: hidden; }
        .icon-box { background-color: #334155; padding: 8px; border-radius: 10px; display: flex; justify-content: center; align-items: center; transition: all 0.3s;}
        .icon-box svg { width: 20px; height: 20px; color: #cbd5e1; }
        .photo-text { font-size: 14px; font-weight: 500; color: #cbd5e1; white-space: nowrap; transition: color 0.3s;}
        .upload-btn { background-color: #334155; color: white; border: none; padding: 8px 16px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .photo-pill.has-photo .icon-box { background-color: rgba(16, 185, 129, 0.2); }
        .photo-pill.has-photo .icon-box svg { color: #10b981; }
        .photo-pill.has-photo .photo-text { color: #10b981; }
        .thumbnails-container { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; }
        .thumbnail-wrapper { position: relative; flex-shrink: 0; width: 50px; height: 50px; border-radius: 10px; overflow: hidden; border: 2px solid #334155; cursor: pointer; transition: border-color 0.2s; }
        .thumbnail-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; transition: opacity 0.2s; }
        .thumbnail-wrapper:hover .thumbnail-img { opacity: 0.3; }
        .thumbnail-delete-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ef4444; opacity: 0; transition: opacity 0.2s; }
        .thumbnail-wrapper:hover .thumbnail-delete-icon { opacity: 1; }
        .btn-container { display: flex; gap: 12px; margin-top: 5px; }
        .action-btn { flex: 1; color: white; border: none; padding: 14px 10px; border-radius: 16px; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 4px; transition: transform 0.1s, opacity 0.3s; box-shadow: 0 8px 15px rgba(0,0,0,0.2); }
        .action-btn:active { transform: scale(0.96); }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .action-btn .main-text { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 6px;}
        .action-btn .sub-text { font-size: 11px; opacity: 0.8; font-weight: 500; }
        .btn-chat { background: linear-gradient(135deg, #6366f1, #4f46e5); border: 1px solid rgba(99, 102, 241, 0.3); }
        .btn-report { background: linear-gradient(135deg, #10b981, #059669); border: 1px solid rgba(16, 185, 129, 0.3); }
        .chat-container { width: 100%; max-width: 480px; background-color: #1e293b; border-radius: 24px; border: 1px solid #334155; margin-top: 15px; display: none; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .chat-header { background-color: #334155; padding: 12px 20px; font-weight: 700; font-size: 15px; display: flex; justify-content: space-between; align-items: center;}
        .chat-close { background: none; border: none; color: #cbd5e1; font-size: 20px; cursor: pointer; }
        .chat-messages { padding: 20px; display: flex; flex-direction: column; gap: 15px; max-height: 400px; overflow-y: auto; }
        .bubble { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 14.5px; line-height: 1.5; }
        .bubble-user { align-self: flex-end; background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; border-bottom-right-radius: 4px; }
        .bubble-ai { align-self: flex-start; background-color: #334155; color: #f8fafc; border-bottom-left-radius: 4px; border: 1px solid #475569; }
        .bubble-ai ul { padding-left: 20px; margin-top: 8px; margin-bottom: 8px; }
        .bubble-ai p { margin-bottom: 8px; }
        .bubble-ai p:last-child { margin-bottom: 0; }
        .typing-indicator { display: flex; gap: 4px; padding: 12px 16px; background-color: #334155; border-radius: 18px; border-bottom-left-radius: 4px; align-self: flex-start; width: fit-content; }
        .dot { width: 6px; height: 6px; background-color: #94a3b8; border-radius: 50%; animation: typing 1.4s infinite ease-in-out; }
        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
        .spinner { animation: spin 1s linear infinite; width: 18px; height: 18px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }

        /* MODÁLNÍ OKNO PRO NASTAVENÍ KLÍČŮ */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal-content { background: #1e293b; width: 100%; max-width: 400px; border-radius: 20px; padding: 24px; border: 1px solid #475569; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .modal-title { font-size: 18px; font-weight: 700; border-bottom: 1px solid #334155; padding-bottom: 10px; margin-bottom: 5px; }
        .modal-input-group { display: flex; flex-direction: column; gap: 5px; }
        .modal-input-group label { font-size: 13px; color: #94a3b8; font-weight: 600; }
        .modal-input { width: 100%; background: #0f172a; border: 1px solid #475569; border-radius: 12px; padding: 12px; color: #f8fafc; font-size: 14px; outline: none; }
        .modal-input:focus { border-color: #10b981; }
        .modal-btns { display: flex; gap: 10px; margin-top: 10px; }
        .modal-btn { flex: 1; padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s;}
        .modal-btn-save { background: #10b981; color: white; }
        .modal-btn-cancel { background: #334155; color: #cbd5e1; }
        .modal-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <div class="header-title">Garmin AI Trenér</div>
            <div class="status-dot"></div>
        </div>

        <div class="sync-info">
            <span class="sync-label">Data z Garminu (Tvá DB):</span>
            <span id="syncTime" class="sync-time">Hledám...</span>
        </div>

        <div class="input-group">
            <div class="input-label">
                <span>Hlášení & Úkoly pro AI</span>
                <span class="change-token" onclick="openSettingsModal()">⚙️ Nastavení API</span>
            </div>
            <textarea id="zprava" class="textarea-custom" placeholder="Napiš, jak se cítíš, nebo na co se chceš zeptat..."></textarea>
        </div>

        <div class="photo-section">
            <div class="photo-pill" id="photoPill">
                <div class="photo-info">
                    <div class="icon-box">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 0 1 5.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 0 0-1.134-.175 2.31 2.31 0 0 1-1.64-1.055l-.822-1.316a2.192 2.192 0 0 0-1.736-1.039 48.774 48.774 0 0 0-5.232 0 2.192 2.192 0 0 0-1.736 1.039l-.821 1.316Z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0ZM18.75 10.5h.008v.008h-.008V10.5Z" />
                        </svg>
                    </div>
                    <span id="fotoNazev" class="photo-text">Přidat fotky (max 10)</span>
                </div>
                <input type="file" id="fotoInput" accept="image/*" multiple style="display: none;">
                <button class="upload-btn" onclick="document.getElementById('fotoInput').click()">+ Přidat</button>
            </div>
            <div id="thumbnailsContainer" class="thumbnails-container"></div>
        </div>

        <div class="btn-container">
            <button id="btnChat" class="action-btn btn-chat" onclick="bezpecneOdeslat('chat')">
                <span class="main-text">💬 Živý Chatbot</span>
                <span class="sub-text">Odpoví hned zde</span>
            </button>
            <button id="btnReport" class="action-btn btn-report" onclick="bezpecneOdeslat('report')">
                <span class="main-text">🚀 Velký Report</span>
                <span class="sub-text">Nová data do E-mailu</span>
            </button>
        </div>
    </div>

    <!-- ŽIVÉ CHATOVACÍ OKNO -->
    <div id="chatContainer" class="chat-container">
        <div class="chat-header">
            <span>💬 AI Trenér Chat</span>
            <button class="chat-close" onclick="document.getElementById('chatContainer').style.display='none'">×</button>
        </div>
        <div id="chatMessages" class="chat-messages"></div>
    </div>

    <!-- WIDGET PRO NASTAVENÍ KLÍČŮ -->
    <div id="settingsModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-title">⚙️ Tvé API Klíče</div>
            <div style="font-size:12px; color:#94a3b8; margin-bottom:5px;">Aplikace běží bezpečně v tvém prohlížeči. Klíče se ukládají pouze k tobě do mobilu.</div>
            
            <div class="modal-input-group">
                <label>1. GitHub Personal Access Token</label>
                <input type="text" id="inpGithub" class="modal-input" placeholder="ghp_...">
            </div>
            
            <div class="modal-input-group">
                <label>2. Gemini AI API Key</label>
                <input type="text" id="inpGemini" class="modal-input" placeholder="AIzaSy...">
            </div>
            
            <div class="modal-btns">
                <button class="modal-btn modal-btn-cancel" onclick="closeSettingsModal()">Zavřít</button>
                <button class="modal-btn modal-btn-save" onclick="saveSettings()">Uložit do mobilu</button>
            </div>
        </div>
    </div>

    <!-- HLAVNÍ JAVASCRIPT LOGIKA -->
    <script>
        // TOTO SMĚŘUJE NA TVŮJ SOUKROMÝ REPOZITÁŘ (BACKEND)
        const GITHUB_OWNER = "Kabi1377"; 
        const GITHUB_REPO = "Garmin---AI---Trener-"; 
        const WORKFLOW_ID = "garmin.yml"; 
        let base64ImagesArray = []; 

        function getSafeLocal(key) {
            try { return localStorage.getItem(key); } catch(e) { return null; }
        }
        function setSafeLocal(key, val) {
            try { localStorage.setItem(key, val); } catch(e) { console.error("Nelze uložit"); }
        }

        function openSettingsModal() {
            document.getElementById('inpGithub').value = getSafeLocal('garmin_app_token') || '';
            document.getElementById('inpGemini').value = getSafeLocal('garmin_gemini_token') || '';
            document.getElementById('settingsModal').style.display = 'flex';
        }

        function closeSettingsModal() {
            document.getElementById('settingsModal').style.display = 'none';
        }

        function saveSettings() {
            const gh = document.getElementById('inpGithub').value.trim();
            const gem = document.getElementById('inpGemini').value.trim();
            
            if (gh) setSafeLocal('garmin_app_token', gh);
            if (gem) setSafeLocal('garmin_gemini_token', gem);
            
            closeSettingsModal();
            fetchLastSyncTime();
        }

        async function fetchLastSyncTime() {
            const syncEl = document.getElementById('syncTime');
            const token = getSafeLocal('garmin_app_token');
            
            if (!token) {
                syncEl.innerText = "Klíče chybí (Klikni na Nastavení API)";
                syncEl.style.color = "#ef4444"; 
                return;
            }
            
            syncEl.innerText = "Stahuji data z tvé databáze...";
            syncEl.style.color = "#f59e0b"; 
            
            try {
                const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/historie_planu.json`, {
                    headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3.raw' }
                });
                
                if (res.ok) {
                    const textData = await res.text();
                    try {
                        const data = JSON.parse(textData);
                        if (data && data.length > 0) {
                            const match = data[0].match(/Dashboard GARMIN \((.*?)\)/);
                            if (match) {
                                syncEl.innerText = match[1];
                                syncEl.style.color = "#34d399"; 
                                return;
                            }
                        }
                    } catch(e) {}
                }
                syncEl.innerText = "Neznámý čas / Špatný token";
                syncEl.style.color = "#ef4444";
            } catch(e) {
                syncEl.innerText = "Chyba spojení";
                syncEl.style.color = "#ef4444";
            }
        }

        function updateUI() {
            const container = document.getElementById('thumbnailsContainer');
            container.innerHTML = ''; 
            base64ImagesArray.forEach((b64, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'thumbnail-wrapper';
                wrapper.onclick = () => { base64ImagesArray.splice(index, 1); updateUI(); };
                const img = document.createElement('img');
                img.className = 'thumbnail-img';
                img.src = "data:image/jpeg;base64," + b64;
                const trashIcon = document.createElement('div');
                trashIcon.className = 'thumbnail-delete-icon';
                trashIcon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>`;
                wrapper.appendChild(img); wrapper.appendChild(trashIcon); container.appendChild(wrapper);
            });
            const pill = document.getElementById('photoPill');
            const nazev = document.getElementById('fotoNazev');
            if (base64ImagesArray.length > 0) {
                pill.classList.add('has-photo');
                nazev.innerText = `${base64ImagesArray.length} fotek připraveno ✅`;
            } else {
                pill.classList.remove('has-photo');
                nazev.innerText = "Přidat fotky (max 10)";
            }
        }

        document.getElementById('fotoInput').addEventListener('change', async function(e) {
            try {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;
                if (base64ImagesArray.length + files.length > 10) {
                    alert("Maximálně 10 fotek.");
                    files.splice(10 - base64ImagesArray.length);
                }
                document.getElementById('fotoNazev').innerText = "Zpracovávám...";
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.readAsDataURL(file);
                        reader.onload = function(event) {
                            const img = new Image();
                            img.src = event.target.result;
                            img.onload = function() {
                                const canvas = document.createElement('canvas');
                                const MAX_WIDTH = 800; 
                                const scaleSize = MAX_WIDTH / img.width;
                                canvas.width = MAX_WIDTH;
                                canvas.height = img.height * scaleSize;
                                const ctx = canvas.getContext('2d');
                                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                                const fullBase64 = canvas.toDataURL('image/jpeg', 0.8);
                                base64ImagesArray.push(fullBase64.split(',')[1]);
                                resolve();
                            }
                        };
                    });
                }
                e.target.value = '';
                updateUI();
            } catch(e) { alert("Chyba obrázku: " + e.message); }
        });

        async function bezpecneOdeslat(typ) {
            try {
                await herniLogikaOdeslani(typ);
            } catch (err) {
                alert("Chyba: " + err.message);
                const btnChat = document.getElementById('btnChat');
                const btnReport = document.getElementById('btnReport');
                btnChat.disabled = false; btnReport.disabled = false;
                btnChat.style.opacity = "1"; btnReport.style.opacity = "1";
                btnChat.innerHTML = `<span class="main-text">💬 Živý Chatbot</span><span class="sub-text">Odpoví hned zde</span>`;
                btnReport.innerHTML = `<span class="main-text">🚀 Velký Report</span><span class="sub-text">Nová data do E-mailu</span>`;
            }
        }

        async function fetchGitHubFile(filename, ghToken) {
            try {
                const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${filename}`, {
                    headers: { 'Authorization': `Bearer ${ghToken}`, 'Accept': 'application/vnd.github.v3.raw' }
                });
                if (res.ok) return await res.text();
                return "Zatím prázdné.";
            } catch(e) { return "Chyba načítání z GitHubu."; }
        }

        async function herniLogikaOdeslani(typ_akce) {
            const isChat = typ_akce === 'chat';
            
            const ghToken = getSafeLocal('garmin_app_token');
            const gemToken = getSafeLocal('garmin_gemini_token');
            
            if (!ghToken) { openSettingsModal(); return; }
            if (isChat && !gemToken) { openSettingsModal(); return; }

            const text = document.getElementById('zprava').value;
            if (isChat && !text && base64ImagesArray.length === 0) {
                alert("Napiš Chatbotovi text nebo vlož fotku."); return; 
            }

            const btnChat = document.getElementById('btnChat');
            const btnReport = document.getElementById('btnReport');
            const activeBtn = isChat ? btnChat : btnReport;
            const originalHTML = activeBtn.innerHTML;
            
            btnChat.disabled = true; btnReport.disabled = true;
            btnChat.style.opacity = "0.5"; btnReport.style.opacity = "0.5";
            activeBtn.style.opacity = "1";
            activeBtn.innerHTML = `<svg class="spinner mb-1" style="color:white;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg><span class="main-text text-sm">${isChat ? "Přemýšlím..." : "Odesílám..."}</span>`;

            // ================== VELKÝ REPORT (GitHub) ==================
            if (!isChat) {
                if (base64ImagesArray.length > 0) {
                    for (let i = 0; i < base64ImagesArray.length; i++) {
                        activeBtn.innerHTML = `<span class="main-text text-sm">Foto ${i+1}/${base64ImagesArray.length}...</span>`;
                        let fileName = i === 0 ? "fotka.jpg" : `fotka_${i}.jpg`;
                        let fileSha = null;
                        const getRes = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${fileName}`, { headers: { 'Authorization': `Bearer ${ghToken}` } });
                        if (getRes.ok) { fileSha = (await getRes.json()).sha; }
                        const putBody = { message: `Nahrání ${fileName}`, content: base64ImagesArray[i] };
                        if (fileSha) putBody.sha = fileSha;
                        await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${fileName}`, { method: 'PUT', headers: { 'Authorization': `Bearer ${ghToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify(putBody) });
                    }
                }

                activeBtn.innerHTML = `<span class="main-text text-sm">Spouštím AI...</span>`;
                const dispatchRes = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/actions/workflows/${WORKFLOW_ID}/dispatches`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${ghToken}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ref: 'main', inputs: { zprava: text || "" } })
                });

                if (dispatchRes.ok || dispatchRes.status === 204) {
                    activeBtn.innerHTML = `<span class="main-text text-sm">Úspěch! ✅</span>`;
                    activeBtn.style.background = "linear-gradient(135deg, #059669, #047857)";
                    setTimeout(() => {
                        document.getElementById('zprava').value = ''; base64ImagesArray = []; updateUI();
                        btnChat.disabled = false; btnReport.disabled = false;
                        btnChat.style.opacity = "1"; btnReport.style.opacity = "1";
                        activeBtn.style.background = ""; activeBtn.innerHTML = originalHTML;
                    }, 4000);
                } else {
                    throw new Error("GitHub tě odmítl! Ověř tvůj vložený GitHub Token.");
                }
                return;
            }

            // ================== ŽIVÝ CHATBOT (Gemini) ==================
            const chatContainer = document.getElementById('chatContainer');
            const chatMessages = document.getElementById('chatMessages');
            chatContainer.style.display = "flex";
            chatMessages.innerHTML += `<div class="bubble bubble-user">${text || "[Přiložena Fotografie]"}</div>`;
            
            const typingId = "typing-" + Date.now();
            chatMessages.innerHTML += `<div id="${typingId}" class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
            chatMessages.scrollTop = chatMessages.scrollHeight;

            activeBtn.innerHTML = `<span class="main-text text-sm">Čtu historii...</span>`;
            const denik = await fetchGitHubFile("denik.txt", ghToken);
            let historieData = await fetchGitHubFile("historie_planu.json", ghToken);
            let posledniReporty = "";
            let posledniDatum = document.getElementById('syncTime').innerText;
            
            try {
                let poleHistorie = JSON.parse(historieData);
                posledniReporty = poleHistorie.slice(0, 2).join("\n\n---\n\n");
            } catch(e) {}

            activeBtn.innerHTML = `<span class="main-text text-sm">Odpovídám...</span>`;
            let promptText = `
            Jsi elitní osobní AI trenér. Klient ti píše v živém chatu. Jeho zpráva: "${text}"
            TVŮJ KONTEXT: ${denik}
            POSLEDNÍ 2 REPORTY: ${posledniReporty}
            UPOZORNĚNÍ: Tvá data končí v den: ${posledniDatum}. Nemáš čerstvější data.
            ÚKOL: Odpověz stručně (max 15 vět). Naformátuj odpověď jako čistý HTML kód (<p>, <b>, <ul>).
            `;

            const contentsPayload = [{ parts: [{ text: promptText }] }];
            if (base64ImagesArray.length > 0) {
                base64ImagesArray.forEach(b64 => { contentsPayload[0].parts.push({ inlineData: { mimeType: "image/jpeg", data: b64 } }); });
            }

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-pro:generateContent?key=${gemToken}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: contentsPayload })
            });

            if (!response.ok) throw new Error("Google AI to odmítl. Zkontroluj svůj Gemini API Key.");
            
            const geminiData = await response.json();
            const aiOdpoved = geminiData.candidates[0].content.parts[0].text;
            const cisteHtml = aiOdpoved.replace(/```html/g, '').replace(/```/g, '').trim();

            document.getElementById(typingId).remove();
            chatMessages.innerHTML += `<div class="bubble bubble-ai">${cisteHtml}</div>`;
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // ULOŽENÍ HISTORIE NA GITHUB
            try {
                let chatSha = null; let chatHistory = [];
                const chatRes = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/chat_log.json`, { headers: { 'Authorization': `Bearer ${ghToken}` } });
                if (chatRes.ok) {
                    const chatData = await chatRes.json();
                    chatSha = chatData.sha;
                    chatHistory = JSON.parse(decodeURIComponent(escape(atob(chatData.content))));
                }
                chatHistory.push({ "uživatel": text || "[Poslal foto]", "ai": cisteHtml });
                if (chatHistory.length > 5) chatHistory = chatHistory.slice(chatHistory.length - 5);
                const newContentBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(chatHistory, null, 2))));
                const putBody = { message: "Uložení chatu", content: newContentBase64 };
                if (chatSha) putBody.sha = chatSha;
                fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/chat_log.json`, { method: 'PUT', headers: { 'Authorization': `Bearer ${ghToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify(putBody) });
            } catch(err) {}

            document.getElementById('zprava').value = ''; base64ImagesArray = []; updateUI();
            btnChat.disabled = false; btnReport.disabled = false;
            btnChat.style.opacity = "1"; btnReport.style.opacity = "1";
            activeBtn.innerHTML = originalHTML;
        }

        window.onload = function() {
            setTimeout(fetchLastSyncTime, 500);
        };
    </script>
</body>
</html>
