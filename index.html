<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Garmin AI Trenér</title>
    <style>
        /* RESET A ZÁKLADNÍ NASTAVENÍ */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body { background-color: #0f172a; color: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; overflow: hidden; padding: 6px; }
        
        .app-container { width: 100%; max-width: 480px; height: 100%; display: flex; flex-direction: column; background-color: #1e293b; border-radius: 20px; border: 1px solid #334155; box-shadow: 0 10px 40px rgba(0,0,0,0.5); overflow: hidden; }
        
        .top-section { padding: 12px 15px; background-color: #1e293b; border-bottom: 1px solid #334155; flex-shrink: 0; z-index: 10; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .header-title { font-size: 20px; font-weight: 800; background: linear-gradient(to right, #34d399, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 8px;}
        .status-dot { width: 10px; height: 10px; background-color: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; }
        
        .header-actions { display: flex; gap: 8px; align-items: center; }
        .change-token { font-size: 11px; color: #cbd5e1; background: #334155; padding: 6px 10px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: 600; border: none;}
        .change-token:hover { background: #475569; }
        .clear-chat-btn { font-size: 14px; color: #cbd5e1; background: #334155; padding: 4px 8px; border-radius: 8px; cursor: pointer; transition: 0.2s; border: none; display: flex; align-items: center; justify-content: center; }
        .clear-chat-btn:hover { background: #ef4444; color: white; }

        .sync-info { background-color: rgba(15, 23, 42, 0.6); padding: 8px 12px; border-radius: 10px; border: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .sync-label { color: #94a3b8; }
        .sync-time { color: #f59e0b; font-weight: 700; }

        .chat-messages { flex-grow: 1; min-height: 0; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background-color: #0f172a; scroll-behavior: smooth; box-shadow: inset 0 4px 10px rgba(0,0,0,0.1);}
        .bubble { max-width: 88%; padding: 12px 14px; border-radius: 16px; font-size: 14.5px; line-height: 1.4; word-wrap: break-word; }
        .bubble-user { align-self: flex-end; background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; border-bottom-right-radius: 4px; box-shadow: 0 4px 10px rgba(99, 102, 241, 0.2);}
        .bubble-ai { align-self: flex-start; background-color: #334155; color: #f8fafc; border-bottom-left-radius: 4px; border: 1px solid #475569; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .bubble-ai ul { padding-left: 20px; margin-top: 6px; margin-bottom: 6px; }
        .bubble-ai p { margin-bottom: 6px; }
        .bubble-ai p:last-child { margin-bottom: 0; }
        .bubble-ai b, .bubble-ai strong { color: #34d399; }
        
        .typing-indicator { display: flex; gap: 4px; padding: 10px 14px; background-color: #334155; border-radius: 16px; border-bottom-left-radius: 4px; align-self: flex-start; width: fit-content; }
        .dot { width: 5px; height: 5px; background-color: #94a3b8; border-radius: 50%; animation: typing 1.4s infinite ease-in-out; }
        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

        .bottom-section { padding: 10px 15px 12px 15px; background-color: #1e293b; border-top: 1px solid #334155; flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; z-index: 10; }

        .input-group { display: flex; flex-direction: column; gap: 4px; }
        .input-label { font-size: 11px; font-weight: 600; color: #94a3b8; margin-left: 4px; text-transform: uppercase; letter-spacing: 0.5px;}
        .textarea-custom { width: 100%; height: 60px; background-color: #0f172a; border: 1px solid #475569; border-radius: 12px; padding: 10px; font-size: 14px; color: #f8fafc; resize: none; transition: border-color 0.3s; }
        .textarea-custom:focus { outline: none; border-color: #10b981; box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2); }
        .textarea-custom::placeholder { color: #64748b; }

        .btn-container { display: flex; gap: 8px; }
        .action-btn { flex: 1; color: white; border: none; padding: 10px 4px; border-radius: 10px; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 2px; transition: transform 0.1s, opacity 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .action-btn:active { transform: scale(0.96); }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .action-btn .main-text { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 4px;}
        .action-btn .sub-text { font-size: 9.5px; opacity: 0.8; font-weight: 500; }
        .btn-chat { background: linear-gradient(135deg, #6366f1, #4f46e5); border: 1px solid rgba(99, 102, 241, 0.3); }
        .btn-report { background: linear-gradient(135deg, #10b981, #059669); border: 1px solid rgba(16, 185, 129, 0.3); }

        .photo-section { display: flex; flex-direction: column; gap: 4px; margin-top: 2px; }
        .photo-pill { display: flex; align-items: center; justify-content: space-between; background-color: #0f172a; border: 1px dashed #475569; border-radius: 10px; padding: 6px 10px; }
        .photo-info { display: flex; align-items: center; gap: 8px; overflow: hidden; }
        .icon-box { background-color: #334155; padding: 5px; border-radius: 6px; display: flex; justify-content: center; align-items: center; transition: all 0.3s;}
        .icon-box svg { width: 14px; height: 14px; color: #cbd5e1; }
        .photo-text { font-size: 12px; font-weight: 500; color: #cbd5e1; white-space: nowrap; transition: color 0.3s;}
        .upload-btn { background-color: #334155; color: white; border: none; padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        
        .photo-pill.has-photo { border-style: solid; border-color: #10b981; background-color: rgba(16, 185, 129, 0.05);}
        .photo-pill.has-photo .icon-box { background-color: rgba(16, 185, 129, 0.2); }
        .photo-pill.has-photo .icon-box svg { color: #10b981; }
        .photo-pill.has-photo .photo-text { color: #10b981; }

        .thumbnails-container { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; }
        .thumbnail-wrapper { position: relative; flex-shrink: 0; width: 40px; height: 40px; border-radius: 8px; overflow: hidden; border: 2px solid #334155; cursor: pointer; transition: border-color 0.2s; }
        .thumbnail-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; transition: opacity 0.2s; }
        .thumbnail-wrapper:hover .thumbnail-img { opacity: 0.3; }
        .thumbnail-delete-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ef4444; opacity: 0; transition: opacity 0.2s; }
        .thumbnail-wrapper:hover .thumbnail-delete-icon { opacity: 1; }

        ::-webkit-scrollbar { height: 4px; width: 4px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal-content { background: #1e293b; width: 100%; max-width: 400px; border-radius: 20px; padding: 20px; border: 1px solid #475569; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .modal-title { font-size: 16px; font-weight: 700; border-bottom: 1px solid #334155; padding-bottom: 8px; margin-bottom: 2px; color: white;}
        .modal-input-group { display: flex; flex-direction: column; gap: 4px; }
        .modal-input-group label { font-size: 12px; color: #94a3b8; font-weight: 600; }
        .modal-input { width: 100%; background: #0f172a; border: 1px solid #475569; border-radius: 10px; padding: 10px; color: #f8fafc; font-size: 13px; outline: none; }
        .modal-input:focus { border-color: #10b981; }
        .modal-btns { display: flex; gap: 10px; margin-top: 5px; }
        .modal-btn { flex: 1; padding: 10px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s;}
        .modal-btn-save { background: #10b981; color: white; }
        .modal-btn-cancel { background: #334155; color: #cbd5e1; }

        .spinner { animation: spin 1s linear infinite; width: 16px; height: 16px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; display: inline-block; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="top-section">
            <div class="header">
                <div class="header-title">
                    <div class="status-dot"></div>
                    Garmin AI Trenér
                </div>
                <div class="header-actions">
                    <button class="clear-chat-btn" onclick="clearLocalChat()" title="Vymazat chat z displeje">🗑️</button>
                    <button class="change-token" onclick="openSettingsModal()">⚙️ Klíče</button>
                </div>
            </div>
            <div class="sync-info">
                <span class="sync-label">Garmin Data z:</span>
                <span id="syncTime" class="sync-time">Zjišťuji...</span>
            </div>
        </div>

        <div id="chatMessages" class="chat-messages">
            <!-- Dynamický obsah -->
        </div>

        <div class="bottom-section">
            <div class="input-group">
                <span class="input-label">Hlášení & Úkoly pro AI</span>
                <textarea id="zprava" class="textarea-custom" placeholder="Napiš, co máš na srdci..."></textarea>
            </div>

            <div class="btn-container">
                <button id="btnChat" class="action-btn btn-chat" onclick="bezpecneOdeslat('chat')">
                    <span class="main-text">💬 Živý Chat</span>
                    <span class="sub-text">Okamžitá odpověď</span>
                </button>
                <button id="btnReport" class="action-btn btn-report" onclick="bezpecneOdeslat('report')">
                    <span class="main-text">🚀 Velký Report</span>
                    <span class="sub-text">Do E-mailu (PDF)</span>
                </button>
            </div>

            <div class="photo-section">
                <div class="photo-pill" id="photoPill">
                    <div class="photo-info">
                        <div class="icon-box">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 0 1 5.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 0 0-1.134-.175 2.31 2.31 0 0 1-1.64-1.055l-.822-1.316a2.192 2.192 0 0 0-1.736-1.039 48.774 48.774 0 0 0-5.232 0 2.192 2.192 0 0 0-1.736 1.039l-.821 1.316Z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0ZM18.75 10.5h.008v.008h-.008V10.5Z" />
                            </svg>
                        </div>
                        <span id="fotoNazev" class="photo-text">Přidat fotky / video</span>
                    </div>
                    <input type="file" id="fotoInput" accept="image/*, video/*" multiple style="display: none;">
                    <button class="upload-btn" onclick="document.getElementById('fotoInput').click()">Vybrat soubor</button>
                </div>
                <div id="thumbnailsContainer" class="thumbnails-container"></div>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-title">⚙️ Tvé API Klíče</div>
            <div style="font-size:11px; color:#94a3b8; margin-bottom:5px;">Uloží se bezpečně pouze k tobě do prohlížeče.</div>
            <div class="modal-input-group">
                <label>1. GitHub Token (Musí mít právo "repo")</label>
                <input type="password" id="inpGithub" class="modal-input" placeholder="ghp_...">
            </div>
            <div class="modal-input-group">
                <label>2. Gemini AI API Key</label>
                <input type="password" id="inpGemini" class="modal-input" placeholder="AIzaSy...">
            </div>
            <div class="modal-btns">
                <button class="modal-btn modal-btn-cancel" onclick="closeSettingsModal()">Zavřít</button>
                <button class="modal-btn modal-btn-save" onclick="saveSettings()">Uložit do mobilu</button>
            </div>
        </div>
    </div>

    <script>
        const GITHUB_OWNER = "Kabi1377"; 
        const GITHUB_REPO = "Garmin---AI---Trener-"; 
        const WORKFLOW_ID = "garmin.yml"; 
        
        let base64ImagesArray = []; 
        let inMemoryStorage = {};
        let localChatHistory = [];

        function getSafeLocal(key) {
            try { if (window.localStorage) { let val = window.localStorage.getItem(key); if (val) return val; } } catch(e) {}
            return inMemoryStorage[key] || null;
        }
        function setSafeLocal(key, val) {
            try { if (window.localStorage) window.localStorage.setItem(key, val); } catch(e) {}
            inMemoryStorage[key] = val;
        }

        const textareaZprava = document.getElementById('zprava');
        textareaZprava.addEventListener('input', function() { setSafeLocal('garmin_draft_msg', this.value); });
        function loadDraftMessage() { const savedDraft = getSafeLocal('garmin_draft_msg'); if (savedDraft) textareaZprava.value = savedDraft; }

        function scrollChatToBottom() {
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function loadChatHistory() {
            const savedChat = getSafeLocal('garmin_local_chat');
            const chatMessages = document.getElementById('chatMessages');
            if (savedChat) {
                try {
                    localChatHistory = JSON.parse(savedChat);
                    if (localChatHistory.length > 0) {
                        chatMessages.innerHTML = '';
                        localChatHistory.forEach(msg => {
                            let style = msg.style ? ` style="${msg.style}"` : "";
                            chatMessages.innerHTML += `<div class="bubble bubble-${msg.role}"${style}>${msg.content}</div>`;
                        });
                        scrollChatToBottom();
                        return;
                    }
                } catch(e) {}
            }
            chatMessages.innerHTML = `<div class="bubble bubble-ai">👋 Ahoj Kabi! Jsem tvůj AI Trenér. Jsem připraven na dnešní report.</div>`;
        }

        function appendMessage(role, htmlContent, customStyle = null) {
            const chatMessages = document.getElementById('chatMessages');
            let styleAttr = customStyle ? ` style="${customStyle}"` : "";
            chatMessages.innerHTML += `<div class="bubble bubble-${role}"${styleAttr}>${htmlContent}</div>`;
            localChatHistory.push({ role: role, content: htmlContent, style: customStyle });
            if (localChatHistory.length > 30) localChatHistory.shift();
            setSafeLocal('garmin_local_chat', JSON.stringify(localChatHistory));
            scrollChatToBottom();
        }

        function clearLocalChat() {
            if(confirm("Opravdu vymazat historii chatu z displeje?")) {
                localChatHistory = [];
                setSafeLocal('garmin_local_chat', JSON.stringify([]));
                document.getElementById('chatMessages').innerHTML = `<div class="bubble bubble-ai">🧹 Chat promazán. Paměť na GitHubu zůstává aktivní.</div>`;
            }
        }

        async function fetchLastSyncTime() {
            const syncEl = document.getElementById('syncTime');
            const token = getSafeLocal('garmin_app_token');
            if (!token) { syncEl.innerText = "Nenastaveno (⚙️)"; return; }
            
            try {
                const cacheBuster = new Date().getTime();
                const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/posledni_sync.json?t=${cacheBuster}`, {
                    headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3.raw' }, cache: 'no-store'
                });
                if (res.ok) {
                    const data = await res.json();
                    syncEl.innerText = `${data.datum} v ${data.cas}`;
                    syncEl.style.color = "#34d399";
                } else {
                    syncEl.innerText = "Zatím bez dat (Spusť Report)";
                }
            } catch(e) { syncEl.innerText = "Chyba spojení"; }
        }

        function openSettingsModal() {
            document.getElementById('inpGithub').value = getSafeLocal('garmin_app_token') || '';
            document.getElementById('inpGemini').value = getSafeLocal('garmin_gemini_token') || '';
            document.getElementById('settingsModal').style.display = 'flex';
        }
        function closeSettingsModal() { document.getElementById('settingsModal').style.display = 'none'; }
        function saveSettings() {
            const gh = document.getElementById('inpGithub').value.trim();
            const gem = document.getElementById('inpGemini').value.trim();
            if (gh) setSafeLocal('garmin_app_token', gh);
            if (gem) setSafeLocal('garmin_gemini_token', gem);
            closeSettingsModal();
            setTimeout(fetchLastSyncTime, 300);
        }

        function updateUI() {
            const container = document.getElementById('thumbnailsContainer');
            container.innerHTML = ''; 
            base64ImagesArray.forEach((b64, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'thumbnail-wrapper';
                wrapper.onclick = () => { base64ImagesArray.splice(index, 1); updateUI(); };
                const img = document.createElement('img');
                img.className = 'thumbnail-img';
                img.src = "data:image/jpeg;base64," + b64;
                wrapper.innerHTML = `<div class="thumbnail-delete-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></div>`;
                wrapper.prepend(img); container.appendChild(wrapper);
            });
            const pill = document.getElementById('photoPill');
            if (base64ImagesArray.length > 0) { pill.classList.add('has-photo'); document.getElementById('fotoNazev').innerText = `${base64ImagesArray.length} položek připraveno ✅`; }
            else { pill.classList.remove('has-photo'); document.getElementById('fotoNazev').innerText = "Přidat fotky / video"; }
        }

        document.getElementById('fotoInput').addEventListener('change', async function(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            for(let f of files) { if(f.type.startsWith('video/')) { alert("🎬 Odesílání videí je zatím omezeno. Nahraj prosím fotky."); e.target.value = ''; return; } }
            document.getElementById('fotoNazev').innerText = "Zpracovávám...";
            for (let file of files) {
                await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (event) => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 800; const scaleSize = MAX_WIDTH / img.width;
                            canvas.width = MAX_WIDTH; canvas.height = img.height * scaleSize;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            base64ImagesArray.push(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
                            resolve();
                        }
                    };
                });
            }
            e.target.value = ''; updateUI();
        });

        // 3X OŠETŘENÁ A OPRAVENÁ LOGIKA ODESÍLÁNÍ
        async function herniLogikaOdeslani(typ_akce) {
            const isChat = typ_akce === 'chat';
            const ghToken = getSafeLocal('garmin_app_token'), gemToken = getSafeLocal('garmin_gemini_token');
            if (!ghToken || (isChat && !gemToken)) { openSettingsModal(); return; }
            const text = textareaZprava.value;
            if (isChat && !text && base64ImagesArray.length === 0) { alert("Napiš nejdřív zprávu nebo vlož fotku."); return; }

            const btnChat = document.getElementById('btnChat');
            const btnReport = document.getElementById('btnReport');
            const activeBtn = isChat ? btnChat : btnReport;
            
            // Pojistka pro správné navrácení textů na tlačítka
            const origChatHTML = `<span class="main-text">💬 Živý Chat</span><span class="sub-text">Okamžitá odpověď</span>`;
            const origReportHTML = `<span class="main-text">🚀 Velký Report</span><span class="sub-text">Do E-mailu (PDF)</span>`;

            btnChat.disabled = btnReport.disabled = true; 
            btnChat.style.opacity = "0.5"; btnReport.style.opacity = "0.5";
            activeBtn.style.opacity = "1";
            activeBtn.innerHTML = `<svg class="spinner mb-1" style="color:white;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg><span class="main-text text-sm">${isChat ? "Odesílám..." : "Generuji..."}</span>`;

            if(isChat) appendMessage('user', text + (base64ImagesArray.length > 0 ? "<br><i>[Přiloženy fotky]</i>" : ""));
            else appendMessage('user', `<i>[Požadavek na Velký Report: ${text || "Bez doplňující zprávy"}]</i>`);

            if (!isChat) {
                // VELKÝ REPORT (Jednoduchý a spolehlivý Fire & Forget)
                if (base64ImagesArray.length > 0) {
                    for (let i = 0; i < base64ImagesArray.length; i++) {
                        let fileName = i === 0 ? "fotka.jpg" : `fotka_${i}.jpg`, fileSha = null;
                        const gRes = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${fileName}`, { headers: { 'Authorization': `Bearer ${ghToken}` } });
                        if (gRes.ok) fileSha = (await gRes.json()).sha;
                        await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${fileName}`, { method: 'PUT', headers: { 'Authorization': `Bearer ${ghToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ message: `Upload ${fileName}`, content: base64ImagesArray[i], sha: fileSha }) });
                    }
                }

                const dRes = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/actions/workflows/${WORKFLOW_ID}/dispatches`, { 
                    method: 'POST', 
                    headers: { 'Authorization': `Bearer ${ghToken}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ ref: 'main', inputs: { zprava: text || "" } }) 
                });
                
                if (dRes.ok || dRes.status === 204) {
                    appendMessage('ai', "🚀 <b>Povel úspěšně odeslán!</b> Skript se spustil na pozadí. Aplikaci nyní můžeš bezpečně zavřít. Jakmile bude report hotový, <b>tvoje e-mailová aplikace tě sama upozorní notifikací</b>.", "border-left: 4px solid #10b981; background-color: rgba(16, 185, 129, 0.1);");
                } else {
                    throw new Error(`GitHub tě odmítl (HTTP ${dRes.status}).`);
                }
            } else {
                // ŽIVÝ CHATBOT
                const chatMessages = document.getElementById('chatMessages');
                const typingId = "typing-" + Date.now();
                chatMessages.innerHTML += `<div id="${typingId}" class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
                scrollChatToBottom();

                const denik = await fetchGitHubFile("denik.txt", ghToken);
                let hData = await fetchGitHubFile("historie_planu.json", ghToken), pReporty = "";
                try { pReporty = JSON.parse(hData).slice(0, 20).join("\n\n---\n\n"); } catch(e) {}
                
                let promptText = `Jsi elitní osobní AI trenér. Klient ti píše v chatu: "${text}". KONTEXT (Deník): ${denik}. POSLEDNÍCH 20 REPORTŮ: ${pReporty}. ÚKOL: Odpověz bleskově, přátelsky a přímo k věci (max 15 vět). Formátuj jako čistý HTML kód (použij <p>, <b>, <ul>).`;
                const payload = { contents: [{ parts: [{ text: promptText }] }] };
                base64ImagesArray.forEach(b => payload.contents[0].parts.push({ inlineData: { mimeType: "image/jpeg", data: b } }));
                
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-pro:generateContent?key=${gemToken}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if(!response.ok) throw new Error("Google AI tě odmítlo. Zkontroluj klíč.");
                
                const data = await response.json();
                const aiOdpoved = data.candidates[0].content.parts[0].text.replace(/```html/g, '').replace(/```/g, '').trim();
                
                document.getElementById(typingId).remove();
                appendMessage('ai', aiOdpoved);

                try {
                    let chatSha = null, chatHistory = [];
                    const chatRes = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/chat_log.json?t=${new Date().getTime()}`, { headers: { 'Authorization': `Bearer ${ghToken}` }, cache: 'no-store' });
                    if (chatRes.ok) {
                        const chatJson = await chatRes.json();
                        chatSha = chatJson.sha;
                        chatHistory = JSON.parse(decodeURIComponent(escape(atob(chatJson.content))));
                    }
                    chatHistory.push({ "uživatel": text || "[Foto]", "ai": aiOdpoved });
                    if (chatHistory.length > 5) chatHistory = chatHistory.slice(-5);
                    const putBody = { message: "Uložení chatu", content: btoa(unescape(encodeURIComponent(JSON.stringify(chatHistory, null, 2)))), sha: chatSha };
                    fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/chat_log.json`, { method: 'PUT', headers: { 'Authorization': `Bearer ${ghToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify(putBody) });
                } catch(err) {}
            }

            // Bezpečný úklid a obnova tlačítek
            textareaZprava.value = ''; setSafeLocal('garmin_draft_msg', ''); base64ImagesArray = []; updateUI();
            btnChat.disabled = btnReport.disabled = false;
            btnChat.style.opacity = "1"; btnReport.style.opacity = "1";
            btnChat.innerHTML = `<span class="main-text">💬 Živý Chat</span><span class="sub-text">Okamžitá odpověď</span>`;
            btnReport.innerHTML = `<span class="main-text">🚀 Velký Report</span><span class="sub-text">Do E-mailu (PDF)</span>`;
        }

        async function fetchGitHubFile(f, t) {
            const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${f}?t=${new Date().getTime()}`, { headers: { 'Authorization': `Bearer ${t}`, 'Accept': 'application/vnd.github.v3.raw' }, cache: 'no-store' });
            return res.ok ? await res.text() : "";
        }

        // Ultimátní obalovač (try-catch) zaručí, že se tlačítka odblokují i v případě kritické chyby sítě
        async function bezpecneOdeslat(t) { 
            const btnChat = document.getElementById('btnChat');
            const btnReport = document.getElementById('btnReport');
            try { 
                await herniLogikaOdeslani(t); 
            } catch (e) { 
                alert("Něco se pokazilo: " + e.message); 
                btnChat.disabled = btnReport.disabled = false; 
                btnChat.style.opacity = "1"; btnReport.style.opacity = "1";
                btnChat.innerHTML = `<span class="main-text">💬 Živý Chat</span><span class="sub-text">Okamžitá odpověď</span>`;
                btnReport.innerHTML = `<span class="main-text">🚀 Velký Report</span><span class="sub-text">Do E-mailu (PDF)</span>`;
            } 
        }

        window.onload = () => { loadDraftMessage(); loadChatHistory(); setTimeout(fetchLastSyncTime, 400); };
    </script>
</body>
</html>
