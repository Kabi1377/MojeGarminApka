<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Garmin AI Trenér</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; overflow: hidden; padding: 6px; }
        .app-container { width: 100%; max-width: 480px; height: 100%; display: flex; flex-direction: column; background-color: #1e293b; border-radius: 20px; border: 1px solid #334155; box-shadow: 0 10px 40px rgba(0,0,0,0.5); overflow: hidden; }
        .top-section { padding: 12px 15px; background-color: #1e293b; border-bottom: 1px solid #334155; flex-shrink: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .header-title { font-size: 20px; font-weight: 800; background: linear-gradient(to right, #34d399, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 8px;}
        .status-dot { width: 10px; height: 10px; background-color: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; }
        .header-actions { display: flex; gap: 8px; align-items: center; }
        .change-token { font-size: 11px; color: #cbd5e1; background: #334155; padding: 6px 10px; border-radius: 8px; cursor: pointer; border: none; font-weight: 600; }
        .clear-chat-btn { font-size: 14px; background: #334155; padding: 4px 8px; border-radius: 8px; cursor: pointer; border: none; }
        .sync-info { background-color: rgba(15, 23, 42, 0.6); padding: 8px 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .sync-time { color: #f59e0b; font-weight: 700; }
        .chat-messages { flex-grow: 1; min-height: 0; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background-color: #0f172a; scroll-behavior: smooth; }
        .bubble { max-width: 88%; padding: 12px 14px; border-radius: 16px; font-size: 14.5px; line-height: 1.4; word-wrap: break-word; }
        .bubble-user { align-self: flex-end; background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; border-bottom-right-radius: 4px; }
        .bubble-ai { align-self: flex-start; background-color: #334155; color: #f8fafc; border-bottom-left-radius: 4px; }
        .bottom-section { padding: 10px 15px 12px 15px; background-color: #1e293b; border-top: 1px solid #334155; flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; }
        .textarea-custom { width: 100%; height: 60px; background-color: #0f172a; border: 1px solid #475569; border-radius: 12px; padding: 10px; font-size: 14px; color: #f8fafc; resize: none; }
        .btn-container { display: flex; gap: 8px; }
        .action-btn { flex: 1; color: white; border: none; padding: 10px 4px; border-radius: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .btn-chat { background: linear-gradient(135deg, #6366f1, #4f46e5); }
        .btn-report { background: linear-gradient(135deg, #10b981, #059669); }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal-content { background: #1e293b; width: 100%; max-width: 400px; border-radius: 20px; padding: 20px; border: 1px solid #475569; }
        .modal-input { width: 100%; background: #0f172a; border: 1px solid #475569; border-radius: 10px; padding: 10px; color: white; margin-bottom: 10px; }
        .spinner { animation: spin 1s linear infinite; width: 16px; height: 16px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; display: inline-block; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="top-section">
            <div class="header">
                <div class="header-title"><div class="status-dot"></div> Garmin AI Trenér</div>
                <div class="header-actions">
                    <button class="clear-chat-btn" onclick="clearLocalChat()">🗑️</button>
                    <button class="change-token" onclick="openSettingsModal()">⚙️ Klíče</button>
                </div>
            </div>
            <div class="sync-info">
                <span class="sync-label">Garmin Data z:</span>
                <span id="syncTime" class="sync-time">Zjišťuji...</span>
            </div>
        </div>
        <div id="chatMessages" class="chat-messages"></div>
        <div class="bottom-section">
            <textarea id="zprava" class="textarea-custom" placeholder="Napiš hlášení..."></textarea>
            <div class="btn-container">
                <button id="btnChat" class="action-btn btn-chat" onclick="bezpecneOdeslat('chat')">💬 Živý Chat</button>
                <button id="btnReport" class="action-btn btn-report" onclick="bezpecneOdeslat('report')">🚀 Velký Report</button>
            </div>
            <input type="file" id="fotoInput" multiple style="display: none;">
            <button style="width: 100%; background: #334155; color: white; border: none; padding: 8px; border-radius: 10px; font-size: 12px;" onclick="document.getElementById('fotoInput').click()">📷 Přidat fotky</button>
            <div id="thumbnailsContainer" style="display: flex; gap: 5px; margin-top: 5px; overflow-x: auto;"></div>
        </div>
    </div>

    <div id="settingsModal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin-bottom: 10px;">⚙️ API Klíče</h3>
            <input type="password" id="inpGithub" class="modal-input" placeholder="GitHub Token">
            <input type="password" id="inpGemini" class="modal-input" placeholder="Gemini API Key">
            <button style="width: 100%; background: #10b981; color: white; padding: 10px; border-radius: 10px; border: none;" onclick="saveSettings()">Uložit</button>
        </div>
    </div>

    <script>
        const GITHUB_OWNER = "Kabi1377", GITHUB_REPO = "Garmin---AI---Trener-", WORKFLOW_ID = "garmin.yml";
        let base64ImagesArray = [], inMemoryStorage = {}, localChatHistory = [];

        function getSafeLocal(k) { try { return localStorage.getItem(k) || inMemoryStorage[k]; } catch(e) { return inMemoryStorage[k]; } }
        function setSafeLocal(k, v) { try { localStorage.setItem(k, v); } catch(e) {} inMemoryStorage[k] = v; }

        function loadChatHistory() {
            const saved = getSafeLocal('garmin_local_chat');
            const box = document.getElementById('chatMessages');
            if (saved) {
                localChatHistory = JSON.parse(saved);
                box.innerHTML = '';
                localChatHistory.forEach(m => box.innerHTML += `<div class="bubble bubble-${m.role}">${m.content}</div>`);
            } else {
                box.innerHTML = `<div class="bubble bubble-ai">👋 Ahoj Kabi! Jsem připraven na dnešek.</div>`;
            }
            box.scrollTop = box.scrollHeight;
        }

        function appendMessage(role, content) {
            localChatHistory.push({role, content});
            setSafeLocal('garmin_local_chat', JSON.stringify(localChatHistory.slice(-30)));
            const box = document.getElementById('chatMessages');
            box.innerHTML += `<div class="bubble bubble-${role}">${content}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        async function fetchLastSyncTime() {
            const token = getSafeLocal('garmin_app_token');
            if (!token) return;
            try {
                const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/posledni_sync.json?t=${Date.now()}`, { headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3.raw' }});
                if (res.ok) {
                    const d = await res.json();
                    document.getElementById('syncTime').innerText = `${d.datum} v ${d.cas}`;
                }
            } catch(e) {}
        }

        async function bezpecneOdeslat(typ) {
            const isChat = typ === 'chat';
            const ghToken = getSafeLocal('garmin_app_token'), gemToken = getSafeLocal('garmin_gemini_token');
            if (!ghToken || (isChat && !gemToken)) { document.getElementById('settingsModal').style.display = 'flex'; return; }
            
            const btn = document.getElementById(isChat ? 'btnChat' : 'btnReport');
            const orig = btn.innerHTML; btn.disabled = true; btn.innerHTML = `<div class="spinner"></div>`;

            try {
                const text = document.getElementById('zprava').value;
                if(isChat) {
                    appendMessage('user', text);
                    const hRes = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/historie_planu.json`, { headers: { 'Authorization': `Bearer ${ghToken}`, 'Accept': 'application/vnd.github.v3.raw' }});
                    let pReporty = ""; try { pReporty = JSON.parse(await hRes.text()).slice(0, 20).join("\n\n---\n\n"); } catch(e) {}
                    const prompt = `Jsi AI trenér. Klient píše: "${text}". HISTORIE: ${pReporty}. Odpověz stručně HTML kódem.`;
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-pro:generateContent?key=${gemToken}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) });
                    const ai = (await res.json()).candidates[0].content.parts[0].text.replace(/```html/g, '').replace(/```/g, '').trim();
                    appendMessage('ai', ai);
                } else {
                    await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/actions/workflows/${WORKFLOW_ID}/dispatches`, { method: 'POST', headers: { 'Authorization': `Bearer ${ghToken}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' }, body: JSON.stringify({ ref: 'main', inputs: { zprava: text } }) });
                    appendMessage('ai', "🚀 Report se generuje. Sleduj svůj e-mail.");
                }
                document.getElementById('zprava').value = "";
            } catch(e) { alert("Chyba: " + e.message); }
            btn.disabled = false; btn.innerHTML = orig;
        }

        function clearLocalChat() { if(confirm("Smazat historii?")) { localStorage.removeItem('garmin_local_chat'); location.reload(); } }
        function openSettingsModal() { document.getElementById('settingsModal').style.display = 'flex'; }
        function saveSettings() { setSafeLocal('garmin_app_token', document.getElementById('inpGithub').value.trim()); setSafeLocal('garmin_gemini_token', document.getElementById('inpGemini').value.trim()); document.getElementById('settingsModal').style.display = 'none'; fetchLastSyncTime(); }

        window.onload = () => { loadChatHistory(); fetchLastSyncTime(); };
    </script>
</body>
</html>
